<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>획에 담긴 것들</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f3ebe0;
}

canvas {
  display: block;
  cursor: grab;
}

canvas:active {
  cursor: grabbing;
}

.center-text {
  position: fixed;
  left: 50%;
  top: 30%;
  transform: translate(-50%, -50%);
  font-family: "Noto Serif KR", "Batang", "바탕", serif;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: #6b6464;
  z-index: 10;
  pointer-events: none;
  opacity: 40%;
}
</style>
</head>

<body>
<div class="center-text">붓을 찾아보세요.</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>

<script>
const {
  Engine,
  Render,
  Runner,
  Bodies,
  Composite,
  Mouse,
  MouseConstraint,
  Body,
  Events,
  Bounds
} = Matter;

const engine = Engine.create();
const world = engine.world;

engine.gravity.y = 1.1;

const render = Render.create({
  element: document.body,
  engine: engine,
  options: {
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes: false,
    background: "#ffffff"
  }
});

Render.run(render);

const runner = Runner.create();
Runner.run(runner, engine);

const ground = Bodies.rectangle(
  window.innerWidth / 2,
  window.innerHeight + 50,
  window.innerWidth,
  100,
  {
    isStatic: true,
    render: { visible: false }
  }
);

const leftWall = Bodies.rectangle(
  -50,
  window.innerHeight / 2,
  100,
  window.innerHeight,
  {
    isStatic: true,
    render: { visible: false }
  }
);

const rightWall = Bodies.rectangle(
  window.innerWidth + 50,
  window.innerHeight / 2,
  100,
  window.innerHeight,
  {
    isStatic: true,
    render: { visible: false }
  }
);

Composite.add(world, [ground, leftWall, rightWall]);

const svgImages = [
  "img/R1.svg",
  "img/R2.svg",
  "img/R3.svg",
  "img/R4.svg",
  "img/R5.svg",
  "img/R6.svg",
  "img/R7.svg",
  "img/R8.svg",
  "img/R9.svg",
  "img/R10.svg",
  "img/R11.svg",
  "img/R12.svg",
];

// for (let i = 0; i < 80; i++) {
for (let i = 0; i < svgImages.length * 3; i++) {
const svg = svgImages[i % svgImages.length];

  const visualSize = 130 + Math.random() * 40;
  const hitBoxSize = visualSize * 0.8;

  const body = Bodies.rectangle(
    Math.random() * window.innerWidth,
    -100 - i * 80,
    hitBoxSize,
    hitBoxSize,
    {
      restitution: 0.18,
      friction: 0.95,
      frictionAir: 0.015,
      density: 0.002,
      render: {
        sprite: {
          texture: svg,
          xScale: visualSize / 180,
          yScale: visualSize / 180
        }
      }
    }
  );

  body.svgPath = svg;

  if (svg.includes("R12.svg")) {
    body.link = "draw.html";
  }

  Body.rotate(body, Math.random() * Math.PI);

  Composite.add(world, body);
}

const mouse = Mouse.create(render.canvas);

const mouseConstraint = MouseConstraint.create(engine, {
  mouse: mouse,
  constraint: {
    stiffness: 0.2,
    render: {
      visible: false
    }
  }
});

Composite.add(world, mouseConstraint);
render.mouse = mouse;


// 클릭 / 드래그 구분용
let downPosition = null;
let downTime = 0;
let clickedBody = null;

Events.on(mouseConstraint, "mousedown", function(event) {
  const mousePosition = event.mouse.position;
  const bodies = Composite.allBodies(world);

  downPosition = {
    x: mousePosition.x,
    y: mousePosition.y
  };

  downTime = Date.now();
  clickedBody = null;

  for (let body of bodies) {
    if (
      Bounds.contains(body.bounds, mousePosition) &&
      body.link
    ) {
      clickedBody = body;
      break;
    }
  }
});

Events.on(mouseConstraint, "mouseup", function(event) {
  if (!clickedBody || !downPosition) return;

  const mousePosition = event.mouse.position;

  const moveDistance = Math.sqrt(
    Math.pow(mousePosition.x - downPosition.x, 2) +
    Math.pow(mousePosition.y - downPosition.y, 2)
  );

  const pressTime = Date.now() - downTime;

  const isClick = moveDistance < 8 && pressTime < 250;

  if (isClick && clickedBody.link) {
    window.location.href = clickedBody.link;
  }

  downPosition = null;
  clickedBody = null;
});

window.addEventListener("resize", () => {
  location.reload();
});
</script>

</body>
</html>
